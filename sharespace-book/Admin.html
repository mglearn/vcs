<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin | ShareSpace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0A3476;--navy-dark:#071f4a;--gold:#FCB040;--gold-pale:#FEF0D0;--pale:#f7f8fc;--line:#dfe6f5;--text:#172033;--muted:#5b6680;--white:#fff;--red:#b3261e;--green:#1f7a3a}*{box-sizing:border-box}body{margin:0;font-family:'DM Sans',sans-serif;background:var(--pale);color:var(--text);line-height:1.5}.hero{background:linear-gradient(135deg,var(--navy-dark),var(--navy));color:white;padding:32px 20px}.hero-inner{max-width:1180px;margin:0 auto}.eyebrow{text-transform:uppercase;letter-spacing:.12em;color:var(--gold);font-weight:900;font-size:12px;margin:0 0 8px}h1{font-family:'DM Serif Display',serif;font-size:48px;line-height:1;margin:0;font-weight:400}h1 em{color:var(--gold);font-style:italic}.wrap{max-width:1180px;margin:0 auto;padding:22px 20px 44px}.panel{background:white;border:1.5px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 4px 14px rgba(10,52,118,.05)}.login{display:flex;gap:10px;flex-wrap:wrap}.login input{flex:1;min-width:260px}.btn{border:0;border-radius:999px;background:var(--navy);color:white;text-decoration:none;font-weight:900;padding:10px 16px;font-size:14px;cursor:pointer}.btn.gold{background:var(--gold);color:#151515}.btn.ghost{background:#eef2fa;color:var(--navy)}.btn.red{background:var(--red)}.btn.green{background:var(--green)}input,select,textarea{padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font:inherit;background:white;color:var(--text)}textarea{width:100%;min-height:90px;resize:vertical}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}.filters{display:flex;gap:10px;flex-wrap:wrap}.filters input,.filters select{min-width:190px}.status{font-weight:900;color:var(--muted)}.list{display:grid;gap:14px}.item{background:white;border:1.5px solid var(--line);border-radius:16px;padding:16px}.item.pending{border-left:8px solid var(--gold)}.item.approved{border-left:8px solid var(--green)}.item.hidden{border-left:8px solid var(--red);opacity:.8}.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.badge{display:inline-flex;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:900;background:#eef2fa;color:var(--navy)}.badge.pending{background:var(--gold-pale);color:#7a4a00}.badge.approved{background:#eaf7ee;color:var(--green)}.badge.hidden{background:#fdecea;color:var(--red)}.title{font-size:20px;font-weight:900;color:var(--navy-dark);margin:8px 0 6px}.meta{color:var(--muted);font-size:13px;margin-bottom:10px}.reflection{white-space:pre-wrap;margin:0 0 12px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.editbox{display:none;margin-top:14px;padding:14px;background:#fbfcff;border:1px solid var(--line);border-radius:12px}.editbox.open{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.msg{display:none;margin-top:10px;padding:12px;border-radius:12px;font-weight:900}.msg.ok{display:block;background:#eaf7ee;color:var(--green);border:1px solid #bde5c8}.msg.err{display:block;background:#fdecea;color:var(--red);border:1px solid #f6c9c5}a{color:var(--navy);font-weight:900}@media(max-width:700px){.grid{grid-template-columns:1fr}.btn,.login input{width:100%}}
</style>
</head>
<body><header class="hero"><div class="hero-inner"><p class="eyebrow">Password-protected moderation</p><h1>Share<em>Space</em> Admin</h1></div></header><main class="wrap"><section class="panel"><div class="login"><input id="passcode" type="password" placeholder="Admin passcode"><button class="btn gold" id="loginBtn">Load Admin Panel</button><a class="btn ghost" href="index.html">View Gallery</a><a class="btn ghost" href="Submit.html">Submit Page</a><a class="btn ghost" href="Discussion.html">Discussions</a></div><div id="msg" class="msg"></div></section><section class="panel" id="adminPanel" style="display:none"><div class="toolbar"><div><strong id="modText">Moderation</strong><div class="status" id="counts">No submissions loaded.</div></div><div class="actions"><button class="btn" id="toggleMod">Toggle Moderation</button><button class="btn ghost" id="refreshBtn">Refresh</button></div></div></section><section class="panel" id="filtersPanel" style="display:none"><div class="filters"><input id="search" type="search" placeholder="Search submissions"><select id="statusFilter"><option value="all">All statuses</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="hidden">Hidden</option></select><select id="categoryFilter"><option value="all">All categories</option></select></div></section><section class="list" id="list"></section></main>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwp8iS2qlh0Zb23xlTYmiEqcSiOWUpB_O1be5BBhZzMAokJVjrY4KjOtg8rZhP92aSnng/exec';const CATEGORIES=['Amazing Prompts','Gemini Images','ChatGPT Images','Claude Images','Student Projects','Staff Examples','Miscellaneous'];let submissions=[],moderationEnabled=true;const passcode=document.getElementById('passcode'),msg=document.getElementById('msg'),list=document.getElementById('list'),adminPanel=document.getElementById('adminPanel'),filtersPanel=document.getElementById('filtersPanel'),modText=document.getElementById('modText'),counts=document.getElementById('counts'),search=document.getElementById('search'),statusFilter=document.getElementById('statusFilter'),categoryFilter=document.getElementById('categoryFilter');
CATEGORIES.forEach(c=>categoryFilter.insertAdjacentHTML('beforeend',`<option>${escapeHtml(c)}</option>`));
function escapeHtml(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}function show(t,k){msg.className='msg '+k;msg.textContent=t;}function clear(){msg.className='msg';msg.textContent='';}function timeLabel(v){const d=new Date(v);return isNaN(d)?'':d.toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}function body(obj){return new URLSearchParams({...obj,passcode:passcode.value});}
async function apiPost(obj){const res=await fetch(SCRIPT_URL,{method:'POST',body:body(obj)});const data=await res.json();if(!data.ok)throw new Error(data.error||'Request failed.');return data;}async function apiGet(){const res=await fetch(SCRIPT_URL+'?action=adminList&passcode='+encodeURIComponent(passcode.value)+'&_='+Date.now());const data=await res.json();if(!data.ok)throw new Error(data.error||'Could not load admin list.');return data;}
async function load(){clear();if(SCRIPT_URL.indexOf('PASTE_YOUR')===0){show('Paste your Apps Script Web App URL into SCRIPT_URL in Admin.html.','err');return;}try{const data=await apiGet();submissions=data.submissions||[];moderationEnabled=!!data.moderationEnabled;adminPanel.style.display='block';filtersPanel.style.display='block';updateStats();render();show('Admin panel loaded.','ok');}catch(err){show(err.message,'err');}}
function updateStats(){const p=submissions.filter(x=>x.status==='pending').length,a=submissions.filter(x=>x.status==='approved').length,h=submissions.filter(x=>x.status==='hidden').length;modText.textContent='Moderation is '+(moderationEnabled?'ON':'OFF');counts.textContent=`${submissions.length} total • ${p} pending • ${a} approved • ${h} hidden`;}
function filtered(){let arr=[...submissions];const q=search.value.trim().toLowerCase();if(q)arr=arr.filter(x=>[x.title,x.reflection,x.category,x.fileName,x.name,x.email,x.status].join(' ').toLowerCase().includes(q));if(statusFilter.value!=='all')arr=arr.filter(x=>x.status===statusFilter.value);if(categoryFilter.value!=='all')arr=arr.filter(x=>x.category===categoryFilter.value);return arr;}
function render(){const arr=filtered();if(!arr.length){list.innerHTML='<section class="panel">No matching submissions.</section>';return;}list.innerHTML=arr.map(x=>`<article class="item ${escapeHtml(x.status)}" data-id="${escapeHtml(x.id)}"><div class="top"><span class="badge ${escapeHtml(x.status)}">${escapeHtml(x.status)}</span><span class="meta">${timeLabel(x.timestamp)}</span></div><h2 class="title">${escapeHtml(x.title)}</h2><div class="meta"><strong>${escapeHtml(x.category)}</strong> • ${escapeHtml(x.name)} • ${escapeHtml(x.email)} • <a href="${escapeHtml(x.fileUrl)}" target="_blank" rel="noopener">Open file</a></div>${x.reflection?`<p class="reflection">${escapeHtml(x.reflection)}</p>`:''}<div class="meta">${escapeHtml(x.fileName)} • ${escapeHtml(x.mimeType)}</div><div class="actions"><button class="btn green" onclick="setStatus('${escapeJs(x.id)}','approved')">Approve</button><button class="btn" onclick="setStatus('${escapeJs(x.id)}','pending')">Mark Pending</button><button class="btn red" onclick="setStatus('${escapeJs(x.id)}','hidden')">Hide</button><button class="btn ghost" onclick="toggleEdit('${escapeJs(x.id)}')">Edit</button><button class="btn red" onclick="deleteItem('${escapeJs(x.id)}')">Delete</button></div><div class="editbox" id="edit-${escapeHtml(x.id)}"><div class="grid"><input id="name-${escapeHtml(x.id)}" value="${escapeAttr(x.name)}" placeholder="Display name"><input id="email-${escapeHtml(x.id)}" value="${escapeAttr(x.email)}" placeholder="Email"><input id="title-${escapeHtml(x.id)}" value="${escapeAttr(x.title)}" placeholder="Title"><select id="category-${escapeHtml(x.id)}">${CATEGORIES.map(c=>`<option ${c===x.category?'selected':''}>${escapeHtml(c)}</option>`).join('')}</select></div><textarea id="reflection-${escapeHtml(x.id)}">${escapeHtml(x.reflection)}</textarea><div class="actions"><button class="btn gold" onclick="saveEdit('${escapeJs(x.id)}')">Save Edits</button></div></div></article>`).join('');}
function escapeAttr(s){return escapeHtml(s).replace(/"/g,'&quot;')}function escapeJs(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function toggleEdit(id){document.getElementById('edit-'+id).classList.toggle('open');}
async function setStatus(id,status){try{await apiPost({action:'setStatus',id,status});await load();}catch(err){show(err.message,'err');}}
async function saveEdit(id){try{await apiPost({action:'update',id,name:document.getElementById('name-'+id).value,email:document.getElementById('email-'+id).value,title:document.getElementById('title-'+id).value,category:document.getElementById('category-'+id).value,reflection:document.getElementById('reflection-'+id).value});await load();}catch(err){show(err.message,'err');}}
async function deleteItem(id){if(!confirm('Delete this submission and move its Drive file to trash?'))return;try{await apiPost({action:'delete',id});await load();}catch(err){show(err.message,'err');}}
document.getElementById('loginBtn').addEventListener('click',load);document.getElementById('refreshBtn').addEventListener('click',load);document.getElementById('toggleMod').addEventListener('click',async()=>{try{await apiPost({action:'setModeration',enabled:String(!moderationEnabled)});await load();}catch(err){show(err.message,'err');}});[search,statusFilter,categoryFilter].forEach(el=>el.addEventListener('input',render));passcode.addEventListener('keydown',e=>{if(e.key==='Enter')load();});
</script></body></html>
